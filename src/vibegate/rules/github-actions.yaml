rules:
  # --- Unpinned GitHub Action (supply-chain hardening) ---
  # A tag like @v4 or @main is mutable: if the action's repo (or the
  # maintainer's account) is compromised, the tag can be silently repointed
  # to malicious code that your workflow then runs with your repo's
  # permissions and secrets. Pinning to a full commit SHA is the standard
  # mitigation (see: the tj-actions/changed-files incident). This is a plain
  # text regex, not a taint rule — it just checks that whatever follows `@`
  # in a `uses:` line is a full 40-character SHA, not a branch/tag name.
  - id: unpinned-github-action
    languages: [generic]
    severity: WARNING
    message: UNPINNED_CI_ACTION
    pattern-regex: 'uses:\s*[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+(?:/[A-Za-z0-9_.-]+)*@(?!(?:[0-9a-fA-F]{40})\b)\S+'

  # --- pull_request_target trigger (supply-chain hardening) ---
  # Unlike `pull_request`, `pull_request_target` runs with the BASE repo's
  # token and secrets, even for a PR from a fork. It's only actually
  # dangerous when combined with checking out and then building/running the
  # PR's own (untrusted) code — this rule flags any use of the trigger as a
  # presence-based signal to double-check that combination, not a proof that
  # the workflow is exploitable. If this workflow never checks out the PR
  # head ref, or never executes anything from it, this is a false positive
  # and safe to suppress with `# vibegate-ignore`.
  - id: github-actions-pull-request-target
    languages: [generic]
    severity: WARNING
    message: UNSAFE_PR_TRIGGER
    pattern-regex: '(?m)^\s*pull_request_target\s*:'
