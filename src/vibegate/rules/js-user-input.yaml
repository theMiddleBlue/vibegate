rules:
  # --- CLI ---
  - id: js-cli-argv
    pattern: process.argv[...]
    message: CLI_ARG
    languages: [javascript, typescript]
    severity: INFO

  - id: js-cli-commander
    pattern-either:
      - pattern: program.parse(...)
      - pattern: $P.opts()
    message: CLI_ARG
    languages: [javascript, typescript]
    severity: INFO

  # --- STDIN ---
  - id: js-stdin-readline
    pattern-either:
      - pattern: readline.createInterface(...)
      - pattern: $RL.question(...)
      - pattern: process.stdin.on(...)
    message: STDIN
    languages: [javascript, typescript]
    severity: INFO

  # --- HTTP Body ---
  - id: js-http-body-express
    pattern-either:
      - pattern: req.body
      - pattern: req.body.$X
      - pattern: request.body
    message: HTTP_BODY
    languages: [javascript, typescript]
    severity: INFO

  - id: js-http-body-next
    pattern-either:
      - pattern: await req.json()
      - pattern: await request.json()
      - pattern: await req.formData()
    message: HTTP_BODY
    languages: [javascript, typescript]
    severity: INFO

  # --- HTTP Query / Headers ---
  - id: js-http-query
    pattern-either:
      - pattern: req.query.$X
      - pattern: req.params.$X
      - pattern: $SP.searchParams.get(...)
      - pattern: new URL(...).searchParams
    message: HTTP_QUERY
    languages: [javascript, typescript]
    severity: INFO

  - id: js-http-header
    pattern-either:
      - pattern: req.headers[...]
      - pattern: req.headers.$X
      - pattern: request.headers.get(...)
    message: HTTP_HEADER
    languages: [javascript, typescript]
    severity: INFO

  # --- ENV VAR ---
  - id: js-env-var
    pattern: process.env.$X
    message: ENV_VAR
    languages: [javascript, typescript]
    severity: INFO

  # --- EXEC INPUT (high criticality) ---
  # Taint mode: block only when user input reaches a shell-executing sink.
  # exec/execSync run via a shell, so a tainted command arg is injection; the
  # safe form (execFile/spawn with an args array) is not matched. A constant
  # command clears the finding.
  - id: js-exec-input
    mode: taint
    pattern-sources:
      - pattern: process.argv
      - pattern: process.stdin
      - pattern: req.body
      - pattern: request.body
      - pattern: req.query
      - pattern: req.params
      - pattern: req.headers
      - pattern: request.headers
      - pattern: req.cookies
      - pattern: process.env
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: exec($X, ...)
              - pattern: execSync($X, ...)
              - pattern: eval($X)
              - pattern: new Function($X)
          - focus-metavariable: $X
    message: EXEC_INPUT
    languages: [javascript, typescript]
    severity: WARNING

  # --- SSRF (server-side request to a non-constant URL) ---
  # Presence-based, NOT taint (see python-ssrf): flag any outbound fetch whose
  # URL argument is not a string literal. fetch/axios/got/http(s) are the sinks;
  # a hard-coded URL is excluded so safe constant calls do not fire.
  - id: js-ssrf
    patterns:
      - pattern-either:
          # fetch (global / node-fetch / undici)
          - pattern: fetch($URL, ...)
          # axios
          - pattern: axios($URL, ...)
          - pattern: axios.get($URL, ...)
          - pattern: axios.post($URL, ...)
          - pattern: axios.put($URL, ...)
          - pattern: axios.delete($URL, ...)
          - pattern: axios.patch($URL, ...)
          - pattern: axios.head($URL, ...)
          - pattern: "axios.request({url: $URL, ...}, ...)"
          - pattern: "axios({url: $URL, ...}, ...)"
          # got
          - pattern: got($URL, ...)
          - pattern: got.get($URL, ...)
          - pattern: got.post($URL, ...)
          - pattern: got.put($URL, ...)
          - pattern: got.delete($URL, ...)
          - pattern: got.patch($URL, ...)
          - pattern: got.head($URL, ...)
          - pattern: got.stream($URL, ...)
          # node-fetch / undici named
          - pattern: undici.request($URL, ...)
          - pattern: undici.fetch($URL, ...)
          - pattern: request($URL, ...)
          # node http / https
          - pattern: http.get($URL, ...)
          - pattern: https.get($URL, ...)
          - pattern: http.request($URL, ...)
          - pattern: https.request($URL, ...)
          # needle
          - pattern: needle($M, $URL, ...)
          - pattern: needle.get($URL, ...)
          - pattern: needle.post($URL, ...)
          # superagent
          - pattern: superagent($URL, ...)
          - pattern: superagent.get($URL, ...)
          - pattern: superagent.post($URL, ...)
          # ky
          - pattern: ky($URL, ...)
          - pattern: ky.get($URL, ...)
          - pattern: ky.post($URL, ...)
          # phin
          - pattern: phin($URL, ...)
      # Exclude hard-coded URLs (plain string literal). Negative lookahead drops
      # "..."/'...' while keeping variables, member exprs, and template literals
      # (which are usually dynamic).
      - metavariable-regex:
          metavariable: $URL
          regex: ^(?!["']).*
      - focus-metavariable: $URL
    message: SSRF
    languages: [javascript, typescript]
    severity: WARNING

  # --- DB QUERY (high criticality) ---
  # Taint mode with focus on the query string only: db.query(sql, [userId]) keeps
  # the tainted value in the params array, not in $Q, so it does NOT match. Only
  # input concatenated/interpolated into the query text is blocked.
  - id: js-db-query
    mode: taint
    pattern-sources:
      - pattern: process.argv
      - pattern: process.stdin
      - pattern: req.body
      - pattern: request.body
      - pattern: req.query
      - pattern: req.params
      - pattern: req.headers
      - pattern: request.headers
      - pattern: req.cookies
      - pattern: process.env
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $DB.query($Q, ...)
              - pattern: $CLIENT.execute($Q, ...)
              - pattern: knex.raw($Q, ...)
          - focus-metavariable: $Q
    message: DB_QUERY
    languages: [javascript, typescript]
    severity: WARNING

  # --- SSTI (server-side template injection) ---
  # Presence-based, like js-ssrf: flag any template render/compile call whose
  # TEMPLATE SOURCE (not its variables) is not a string literal.
  - id: js-ssti
    patterns:
      - pattern-either:
          - pattern: ejs.render($TPL, ...)
          - pattern: ejs.compile($TPL, ...)
          - pattern: Handlebars.compile($TPL)
          - pattern: handlebars.compile($TPL)
          - pattern: _.template($TPL)
          - pattern: pug.render($TPL, ...)
      - metavariable-regex:
          metavariable: $TPL
          regex: ^(?!["']).*
      - focus-metavariable: $TPL
    message: TEMPLATE_INJECTION
    languages: [javascript, typescript]
    severity: WARNING

  # --- INSECURE DESERIALIZATION (high criticality) ---
  # Taint mode: node-serialize's unserialize() and vm.runInContext-family
  # calls execute the payload's code as a side effect of "deserializing" it.
  - id: js-insecure-deserialization
    mode: taint
    pattern-sources:
      - pattern: process.argv
      - pattern: process.stdin
      - pattern: req.body
      - pattern: request.body
      - pattern: req.query
      - pattern: req.params
      - pattern: req.headers
      - pattern: request.headers
      - pattern: req.cookies
      - pattern: process.env
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: serialize.unserialize($X)
              - pattern: vm.runInContext($X, ...)
              - pattern: vm.runInNewContext($X, ...)
              - pattern: vm.runInThisContext($X, ...)
          - focus-metavariable: $X
    message: INSECURE_DESERIALIZATION
    languages: [javascript, typescript]
    severity: WARNING

  # --- NOSQL INJECTION (high criticality) ---
  # Taint mode focused on the whole query object: passing a request body
  # straight through as a Mongoose/Mongo filter lets an attacker inject
  # operators ($gt, $ne, $where) to bypass auth/filters.
  - id: js-nosql-query
    mode: taint
    pattern-sources:
      - pattern: req.body
      - pattern: request.body
      - pattern: req.query
      - pattern: req.params
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $MODEL.find($Q)
              - pattern: $MODEL.find($Q, ...)
              - pattern: $MODEL.findOne($Q)
              - pattern: $MODEL.findOne($Q, ...)
              - pattern: $MODEL.updateOne($Q, ...)
              - pattern: $MODEL.deleteOne($Q)
              - pattern: $MODEL.countDocuments($Q)
          - focus-metavariable: $Q
    message: NOSQL_QUERY
    languages: [javascript, typescript]
    severity: WARNING

  # --- PATH TRAVERSAL (high criticality) ---
  # Taint mode: traces an actual tainted value into a filesystem sink, which
  # is what makes traversal ("../../etc/passwd") exploitable.
  - id: js-path-traversal
    mode: taint
    pattern-sources:
      - pattern: process.argv
      - pattern: process.stdin
      - pattern: req.body
      - pattern: request.body
      - pattern: req.query
      - pattern: req.params
      - pattern: req.headers
      - pattern: request.headers
      - pattern: req.cookies
      - pattern: process.env
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: fs.readFile($X, ...)
              - pattern: fs.readFileSync($X, ...)
              - pattern: fs.writeFile($X, ...)
              - pattern: fs.unlink($X, ...)
              - pattern: fs.createReadStream($X, ...)
              - pattern: res.sendFile($X, ...)
          - focus-metavariable: $X
    message: PATH_TRAVERSAL
    languages: [javascript, typescript]
    severity: WARNING

  # --- XXE (XML External Entity) ---
  - id: js-xxe
    mode: taint
    pattern-sources:
      - pattern: req.body
      - pattern: request.body
      - pattern: req.query
      - pattern: req.params
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: xml2js.parseString($X, ...)
              - pattern: libxmljs.parseXml($X, ...)
          - focus-metavariable: $X
    message: XXE
    languages: [javascript, typescript]
    severity: WARNING

  # --- XSS (unsafe HTML output) ---
  # DOMPurify.sanitize is declared a sanitizer so already-sanitized HTML
  # doesn't keep tripping the rule.
  - id: js-xss
    mode: taint
    pattern-sources:
      - pattern: req.body
      - pattern: request.body
      - pattern: req.query
      - pattern: req.params
    pattern-sanitizers:
      - pattern: DOMPurify.sanitize(...)
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $EL.innerHTML = $X
              - pattern: $EL.outerHTML = $X
              - pattern: document.write($X)
          - focus-metavariable: $X
      - patterns:
          - pattern: "<$EL dangerouslySetInnerHTML={{__html: $X}} />"
          - focus-metavariable: $X
    message: XSS_SINK
    languages: [javascript, typescript]
    severity: WARNING

  # --- OPEN REDIRECT ---
  # Presence-based, like js-ssrf: a redirect target that isn't a string
  # literal can send victims to an attacker-controlled domain (phishing).
  - id: js-open-redirect
    patterns:
      - pattern-either:
          - pattern: res.redirect($TARGET)
          - pattern: res.redirect($CODE, $TARGET)
          - pattern: NextResponse.redirect($TARGET)
          - pattern: window.location = $TARGET
          - pattern: window.location.href = $TARGET
          - pattern: location.assign($TARGET)
      - metavariable-regex:
          metavariable: $TARGET
          regex: ^(?!["']).*
      - focus-metavariable: $TARGET
    message: OPEN_REDIRECT
    languages: [javascript, typescript]
    severity: WARNING

  # --- FILE UPLOAD (high criticality) ---
  # Taint mode: the client picks the uploaded file's name (multer's
  # `.originalname`), so using it verbatim to build the save path is the
  # classic unrestricted-upload bug — path traversal, or RCE via a renamed
  # webshell if the destination is web-served. `.originalname` is specific
  # enough to use as a bare attribute source.
  - id: js-file-upload
    mode: taint
    pattern-sources:
      - pattern: $F.originalname
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: fs.writeFile($X, ...)
              - pattern: fs.writeFileSync($X, ...)
              - pattern: fs.rename($A, $X, ...)
              - pattern: fs.copyFile($A, $X, ...)
              - pattern: $F2.mv($X)
          - focus-metavariable: $X
    message: FILE_UPLOAD
    languages: [javascript, typescript]
    severity: WARNING

  # --- MASS ASSIGNMENT ---
  # Presence-based: passing the whole request body into a model
  # constructor/update lets an attacker set fields the endpoint never
  # intended to expose (e.g. isAdmin, role).
  - id: js-mass-assignment
    patterns:
      - pattern-either:
          - pattern: new $MODEL(req.body)
          - pattern: new $MODEL(request.body)
          - pattern: $MODEL.create(req.body)
          - pattern: $MODEL.findByIdAndUpdate($ID, req.body)
          - pattern: Object.assign($TARGET, req.body)
          - pattern: _.merge($TARGET, req.body)
    message: MASS_ASSIGNMENT
    languages: [javascript, typescript]
    severity: WARNING

  # --- CREDENTIAL LOGGING ---
  # Presence-based, same idea as python-credential-log: constrain the log
  # verb to real logging methods so this doesn't fire on unrelated calls.
  - id: js-credential-log
    patterns:
      - pattern-either:
          - pattern: console.log($X)
          - pattern: console.log($X, ...)
          - pattern: console.error($X, ...)
          - pattern: console.warn($X, ...)
          - pattern: console.info($X, ...)
          - pattern: console.debug($X, ...)
          - pattern: $LOGGER.info($X, ...)
          - pattern: $LOGGER.warn($X, ...)
          - pattern: $LOGGER.error($X, ...)
          - pattern: $LOGGER.debug($X, ...)
      - metavariable-regex:
          metavariable: $X
          regex: (?i).*(password|passwd|pwd|secret|api[_-]?key|apikey|access[_-]?token|auth[_-]?token|private[_-]?key|passphrase|credential).*
    message: CREDENTIAL
    languages: [javascript, typescript]
    severity: WARNING

  # --- HARDCODED SECRET ---
  # Presence-based, same idea as python-hardcoded-secret.
  - id: js-hardcoded-secret
    patterns:
      - pattern-either:
          - pattern: const $VAR = "$VALUE"
          - pattern: let $VAR = "$VALUE"
          - pattern: var $VAR = "$VALUE"
          - pattern: const $VAR = '$VALUE'
          - pattern: let $VAR = '$VALUE'
          - pattern: var $VAR = '$VALUE'
          - pattern: $OBJ.$VAR = "$VALUE"
          - pattern: $OBJ.$VAR = '$VALUE'
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)^(password|passwd|pwd|secret|secret[_-]?key|api[_-]?key|apikey|access[_-]?key|access[_-]?token|auth[_-]?token|api[_-]?token|session[_-]?token|refresh[_-]?token|oauth[_-]?token|private[_-]?key|passphrase|client[_-]?secret)$
      - metavariable-regex:
          metavariable: $VALUE
          regex: (?i)^(?!(changeme|placeholder|xxx+|todo|example|secret|password|test|dummy|fake)$)(?!\$\{)(?!<).{8,}$
    message: HARDCODED_SECRET
    languages: [javascript, typescript]
    severity: WARNING
