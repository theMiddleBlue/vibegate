[project]
name = "user-input-classifier"
version = "1.0.0"
description = "Host-agnostic pre-write security hook: detects user-input patterns via Semgrep and emits deterministic, no-LLM security guidance."
requires-python = ">=3.11"
dependencies = ["semgrep>=1.100"]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.setuptools.packages.find]
where = ["src"]
